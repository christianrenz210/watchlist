<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — WatchList</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --primary: #6c63ff; --dark: #0f0f1a; --card-bg: #1a1a2e; }
    body { background: var(--dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; }
    .auth-card { background: var(--card-bg); border: 1px solid rgba(108,99,255,0.2); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e0e0e0; border-radius: 10px; padding: 12px 16px; }
    .form-control:focus { background: rgba(255,255,255,0.08); border-color: var(--primary); color: #fff; box-shadow: 0 0 0 3px rgba(108,99,255,0.2); }
    .form-control::placeholder { color: #666; }
    .form-label { color: #aaa; font-size: .9rem; }
    .btn-register { background: var(--primary); border: none; border-radius: 10px; padding: 13px; font-weight: 600; font-size: 1rem; width: 100%; color: #fff; transition: all .3s; }
    .btn-register:hover { background: #5a52d5; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); color: #fff; }
    .input-group-text { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; border-radius: 10px 0 0 10px; }
    .input-group .form-control { border-radius: 0 10px 10px 0; }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center py-5">
  <div class="auth-card">
    <div class="text-center mb-4">
      <a href="/" class="text-decoration-none">
        <i class="bi bi-play-circle-fill fs-2" style="color:var(--primary)"></i>
        <h4 class="fw-bold text-white mt-1">WatchList</h4>
      </a>
      <p class="text-muted">Create your free account</p>
    </div>

    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show border-0 rounded-3" role="alert" style="background:rgba(220,53,69,0.15); color:#ff6b6b;">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <form method="POST" action="/register" id="registerForm">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required minlength="3"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" id="confirm" class="form-control" placeholder="Repeat your password" required/>
        </div>
        <div id="matchError" class="text-danger small mt-1 d-none"><i class="bi bi-x-circle me-1"></i>Passwords do not match</div>
      </div>
      <button type="submit" class="btn btn-register"><i class="bi bi-person-plus me-2"></i>Create Account</button>
    </form>

    <p class="text-center text-muted mt-4 mb-0">Already have an account? <a href="/login" style="color:var(--primary)">Login here</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    const pw = document.getElementById('password').value;
    const cf = document.getElementById('confirm').value;
    const err = document.getElementById('matchError');
    if (pw !== cf) { e.preventDefault(); err.classList.remove('d-none'); }
    else { err.classList.add('d-none'); }
  });
</script>
</body>
</html>
